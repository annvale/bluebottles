  var nt=s.note?'<div class="note-box"><div class="note-label">\u4ed6\u7684\u6279\u6ce8</div><div class="note-text">'+esc(s.note)+'</div></div>':"";
  o.innerHTML='<div class="overlay" id="ov"><div class="modal-scroll" id="mb">'
  +'<button class="icon-btn del-btn" id="bd"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(200,140,140,.4)" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
  +'<div class="story-date">'+esc(s.date)+'</div>'
  +'<div class="story-title-row"><div class="story-title">'+esc(s.title)+'</div>'
  +'<button class="icon-btn" id="be"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(180,200,230,.4)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div>'
  +'<div class="story-body">'+esc(s.content)+'</div>'+nt
  +'<div class="last-words">\u5979\u6700\u540e\u8bf4\uff1a\u300c'+esc(s.lastWords)+'\u300d</div>'
  +'</div><div class="modal-bar" id="mbar"><button class="sea-btn" id="bc">\u653e\u56de\u6d77\u9762</button></div></div>';
  spawnStars(document.getElementById("ov"));
  document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeO();});
  document.getElementById("mb").addEventListener("click",function(e){e.stopPropagation();});
  document.getElementById("mbar").addEventListener("click",function(e){e.stopPropagation();});
  document.getElementById("bc").addEventListener("click",closeO);
  document.getElementById("be").addEventListener("click",function(){editStory(id);});
  document.getElementById("bd").addEventListener("click",function(){confirmDel(id);});
}

function editStory(id){
  var s;for(var i=0;i<stories.length;i++)if(stories[i].id===id){s=stories[i];break;}
  if(!s)return;var o=document.getElementById("overlay");
  o.innerHTML='<div class="overlay" id="ov"><div class="form-box" id="fb">'
  +'<div class="form-title">\u7f16\u8f91\u8fd9\u4e2a\u74f6\u5b50</div>'
  +'<div class="form-group"><label class="form-label">\u65e5\u671f</label><input type="date" class="form-input date-short" id="ed" value="'+s.date+'"></div>'
  +'<div class="form-group"><label class="form-label">\u6545\u4e8b\u540d</label><input class="form-input" id="et" value="'+esc(s.title)+'"></div>'
  +'<div class="form-group"><label class="form-label">\u5979\u6700\u540e\u8bf4\u7684\u8bdd</label><input class="form-input" id="el" value="'+esc(s.lastWords)+'"></div>'
  +'<div class="form-group"><label class="form-label">\u4ed6\u7684\u6279\u6ce8</label><input class="form-input" id="en" value="'+esc(s.note||"")+'" placeholder="\u7070\u72fc\u7684\u6084\u6084\u8bdd"></div>'
  +colorPickerHTML("ec","eg",s.capVar,s.glowVar)
  +'<div class="form-group"><label class="form-label">\u6545\u4e8b</label><textarea class="form-input" id="eo" rows="8">'+esc(s.content)+'</textarea></div>'
  +'<div class="form-actions"><button class="btn-s" id="ex">\u53d6\u6d88</button><button class="btn-s btn-p" id="es">\u4fdd\u5b58</button></div>'
  +'</div></div>';
  document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeO();});
  document.getElementById("fb").addEventListener("click",function(e){e.stopPropagation();});
  bindColorPicker("ec","eg");
  document.getElementById("ex").addEventListener("click",function(){openStory(id);});
  document.getElementById("es").addEventListener("click",function(){
    for(var i=0;i<stories.length;i++)if(stories[i].id===id){
      stories[i].date=document.getElementById("ed").value;stories[i].title=document.getElementById("et").value;
      stories[i].lastWords=document.getElementById("el").value;stories[i].note=document.getElementById("en").value;
      stories[i].content=document.getElementById("eo").value;
      stories[i].capVar=parseInt(document.getElementById("ec").value);
      stories[i].glowVar=parseInt(document.getElementById("eg").value);break;
    }stories.sort(function(a,b){return a.date.localeCompare(b.date);});save();render();openStory(id);
  });
}

function confirmDel(id){
  var o=document.getElementById("overlay");
  o.innerHTML='<div class="overlay" id="ov"><div class="confirm-box" id="cb">'
  +'<div class="confirm-text">\u786e\u5b9a\u8ba9\u8fd9\u4e2a\u74f6\u5b50\u6c89\u5165\u6d77\u5e95\u5417\uff1f<br>\u5b83\u5c06\u6c38\u8fdc\u6d88\u5931\u3002</div>'
  +'<div class="form-actions"><button class="btn-s" id="ck">\u7559\u4f4f\u5b83</button><button class="btn-s btn-d" id="cd">\u6c89\u5165\u6d77\u5e95</button></div>'
  +'</div></div>';
  document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeO();});
  document.getElementById("cb").addEventListener("click",function(e){e.stopPropagation();});
  document.getElementById("ck").addEventListener("click",function(){openStory(id);});
  document.getElementById("cd").addEventListener("click",function(){stories=stories.filter(function(s){return s.id!==id;});save();render();closeO();});
}

var CAP_DOT=["hsl(30,40%,50%)","hsl(220,30%,45%)","hsl(280,25%,42%)"];
var GLOW_DOT=["hsl(45,90%,75%)","hsl(180,70%,70%)","hsl(300,60%,75%)","hsl(120,65%,65%)"];

function colorPickerHTML(capId,glowId,capVal,glowVal){
  var h='<div class="color-row">';
  h+='<div class="color-section"><span class="color-label">\u74f6\u76d6</span>';
  for(var i=0;i<3;i++)h+='<div class="color-dot'+(i===capVal?' active':'')+'" data-type="cap" data-idx="'+i+'" style="background:'+CAP_DOT[i]+'"></div>';
  h+='</div><div class="color-sep"></div><div class="color-section"><span class="color-label">\u8424\u5149</span>';
  for(var j=0;j<4;j++)h+='<div class="color-dot'+(j===glowVal?' active':'')+'" data-type="glow" data-idx="'+j+'" style="background:'+GLOW_DOT[j]+'"></div>';
  h+='</div></div>';
  h+='<input type="hidden" id="'+capId+'" value="'+capVal+'"><input type="hidden" id="'+glowId+'" value="'+glowVal+'">';
  h+='<div class="color-preview" id="cpv"></div>';
  return h;
}

function bindColorPicker(capId,glowId){
  var dots=document.querySelectorAll(".color-dot");
  function updatePreview(){
    var cv=parseInt(document.getElementById(capId).value);
    var gv=parseInt(document.getElementById(glowId).value);
    var pv=document.getElementById("cpv");
    if(pv)pv.innerHTML=bottleSVG(0,{depth:.8,capVar:cv,glowVar:gv});
  }
  dots.forEach(function(d){
    d.addEventListener("click",function(){
      var t=d.getAttribute("data-type"),idx=parseInt(d.getAttribute("data-idx"));
      var siblings=document.querySelectorAll('.color-dot[data-type="'+t+'"]');
      siblings.forEach(function(s){s.classList.remove("active");});
      d.classList.add("active");
      if(t==="cap")document.getElementById(capId).value=idx;
      else document.getElementById(glowId).value=idx;
      updatePreview();
    });
  });
  updatePreview();
}

function showAdd(){
  var o=document.getElementById("overlay");
  o.innerHTML='<div class="overlay" id="ov"><div class="form-box" id="fb">'
  +'<div class="form-title">\u5c01\u5165\u4e00\u4e2a\u65b0\u7684\u74f6\u5b50</div>'
  +'<div class="form-group"><label class="form-label">\u90a3\u4e2a\u591c\u665a</label><input type="date" class="form-input date-short" id="ad"></div>'
  +'<div class="form-group"><label class="form-label">\u6545\u4e8b\u7684\u540d\u5b57</label><input class="form-input" id="at" placeholder="\u6bd4\u5982\uff1a\u5927\u7070\u72fc\u548c\u5c0f\u732b"></div>'
  +'<div class="form-group"><label class="form-label">\u5979\u6700\u540e\u8bf4\u7684\u8bdd</label><input class="form-input" id="al" placeholder="\u95ed\u773c\u524d\u7684\u6700\u540e\u4e00\u53e5"></div>'
  +'<div class="form-group"><label class="form-label">\u4ed6\u7684\u6279\u6ce8</label><input class="form-input" id="an" placeholder="\u7070\u72fc\u7684\u6084\u6084\u8bdd\uff08\u9009\u586b\uff09"></div>'
  +colorPickerHTML("ac","ag",0,0)
  +'<div class="form-group"><label class="form-label">\u6545\u4e8b</label><textarea class="form-input" id="ao" rows="7" placeholder="\u90a3\u4e2a\u591c\u665a\u7684\u6545\u4e8b\u2026\u2026"></textarea></div>'
  +'<div class="form-actions"><button class="btn-s" id="ax">\u653e\u4e0b</button><button class="btn-s btn-p" id="as">\u5c01\u5165\u6d77\u4e2d</button></div>'
  +'</div></div>';
  document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeO();});
  document.getElementById("fb").addEventListener("click",function(e){e.stopPropagation();});
  document.getElementById("ax").addEventListener("click",closeO);
  bindColorPicker("ac","ag");
  document.getElementById("as").addEventListener("click",function(){
    var dt=document.getElementById("ad").value,tt=document.getElementById("at").value,co=document.getElementById("ao").value;
    if(!dt||!tt||!co)return;
    stories.push({id:"s-"+Date.now(),date:dt,title:tt,content:co,
      lastWords:document.getElementById("al").value||"\u2026\u2026",
      note:document.getElementById("an").value||"",
      depth:Math.random()*.4+.5,
      capVar:parseInt(document.getElementById("ac").value),
      glowVar:parseInt(document.getElementById("ag").value)});
    stories.sort(function(a,b){return a.date.localeCompare(b.date);});save();render();closeO();
  });
}

function randomPick(){
  if(!stories.length)return;var s=stories[Math.floor(Math.random()*stories.length)];
  var o=document.getElementById("overlay");
  o.innerHTML='<div class="overlay" id="ov"><div class="rnd-content" id="rb">'
  +'<div class="rnd-label">\u6d77\u6d6a\u9001\u6765\u4e86\u4e00\u4e2a\u74f6\u5b50</div>'
  +'<div class="rnd-bottle">'+bottleSVG(0,s)+'</div>'
  +'<div class="rnd-title">'+esc(s.title)+'</div>'
  +'<div class="rnd-date">'+esc(s.date)+'</div>'
  +'<div class="rnd-actions"><button class="btn-s" id="rk">\u653e\u56de\u53bb</button><button class="btn-s btn-p" id="ro">\u6253\u5f00\u5b83</button></div>'
  +'</div></div>';
  document.getElementById("ov").addEventListener("click",function(e){if(e.target===this)closeO();});
  document.getElementById("rb").addEventListener("click",function(e){e.stopPropagation();});
  document.getElementById("rk").addEventListener("click",closeO);
  (function(sid){document.getElementById("ro").addEventListener("click",function(){closeO();setTimeout(function(){openStory(sid);},100);});})(s.id);
}

function closeO(){document.getElementById("overlay").innerHTML="";}

document.getElementById("rnd-main").addEventListener("click",randomPick);

(function(){
  var c=document.getElementById("particles");
  for(var i=0;i<22;i++){
    var p=document.createElement("div");p.className="particle";var sz=Math.random()*3+1;
    p.style.cssText="width:"+sz+"px;height:"+sz+"px;background:rgba("+(150+Math.random()*100|0)+","+(180+Math.random()*75|0)+",255,"+(Math.random()*.22+.06).toFixed(2)+");left:"+Math.random()*100+"%25;top:"+Math.random()*100+"%25;animation:fp "+(8+Math.random()*12).toFixed(1)+"s ease-in-out infinite;animation-delay:"+(Math.random()*-20).toFixed(1)+"s";
    c.appendChild(p);
  }
})();

(function(){
  var g=document.getElementById("glimmer");
  for(var i=0;i<12;i++){
    var d=document.createElement("div");d.className="glimmer-dot";
    d.style.cssText="left:"+((5+Math.random()*90).toFixed(1))+"%;top:"+(Math.random()*100).toFixed(1)+"%;animation-delay:"+(Math.random()*-4).toFixed(1)+"s;animation-duration:"+(3+Math.random()*4).toFixed(1)+"s";
    g.appendChild(d);
  }
})();

load();
</script>
